name: Publish pipeline

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: "Set up JDK 17"
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'oracle'
          server-id: github
          settings-path: ${{ github.workspace }}

      - name: "Setup Gradle"
        uses: gradle/actions/setup-gradle@v4

      - name: "Run Gradle Publish"
        run: ./gradlew publish

      - name: "Extract mod version"
        run: echo "MOD_VERSION=$(grep '^mod_version=' gradle.properties | cut -d'=' -f2)" >> $GITHUB_ENV

      - name: "Determine release type"
        run: |
          if [[ "${{ github.ref_name }}" == *"-beta"* || "${{ github.ref_name }}" == *"-alpha"* ]]; then
            echo "RELEASE_TYPE=beta" >> $GITHUB_ENV
            echo "PRERELEASE=true" >> $GITHUB_ENV
          else
            echo "RELEASE_TYPE=release" >> $GITHUB_ENV
            echo "PRERELEASE=false" >> $GITHUB_ENV
          fi

      - name: "Create GitHub Release"
        uses: softprops/action-gh-release@v1
        with:
          name: "Release v${{ env.MOD_VERSION }}"
          tag_name: "${{ env.MOD_VERSION }}"
          draft: false
          prerelease: ${{ env.PRERELEASE }}
          files: |
            releases/*

      - name: "CurseForge Publish"
        run: ./gradlew curseforge -PcurseApiKey=${CURSE_API_KEY} -PreleaseType=${RELEASE_TYPE}
        env:
          CURSE_API_KEY: ${{ secrets.CURSE_API_KEY }}
          RELEASE_TYPE: ${{ env.RELEASE_TYPE }}
          BUILD_NUMBER: ${{ github.run_number }}